<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe</h1>
    <h2 id="status">Player X Turn</h2>

    <div class="board">
        <div class="cell" onclick="play(this,0)"></div>
        <div class="cell" onclick="play(this,1)"></div>
        <div class="cell" onclick="play(this,2)"></div>
        <div class="cell" onclick="play(this,3)"></div>
        <div class="cell" onclick="play(this,4)"></div>
        <div class="cell" onclick="play(this,5)"></div>
        <div class="cell" onclick="play(this,6)"></div>
        <div class="cell" onclick="play(this,7)"></div>
        <div class="cell" onclick="play(this,8)"></div>
    </div>

    <button onclick="restart()">Restart</button>

    <script>
        let currentPlayer = "X";
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameOver = false;

        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function play(cell, index) {
            if (board[index] !== "" || gameOver) return;

            board[index] = currentPlayer;
            cell.innerText = currentPlayer;

            if (checkWinner()) {
                document.getElementById("status").innerText =
                    "Player " + currentPlayer + " Wins!";
                gameOver = true;
                return;
            }

            if (!board.includes("")) {
                document.getElementById("status").innerText = "Match Draw!";
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById("status").innerText =
                "Player " + currentPlayer + " Turn";
        }

        function checkWinner() {
            for (let pattern of winPatterns) {
                let [a, b, c] = pattern;
                if (board[a] &&
                    board[a] === board[b] &&
                    board[a] === board[c]) {
                    return true;
                }
            }
            return false;
        }

        function restart() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameOver = false;
            currentPlayer = "X";
            document.getElementById("status").innerText = "Player X Turn";

            let cells = document.querySelectorAll(".cell");
            cells.forEach(cell => cell.innerText = "");
        }
    </script>

</body>
</html>
